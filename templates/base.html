<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title or '丽迪莎零售智能平台' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=4" />
</head>
<body class="app-shell">
  <div class="shell-layout">
    <aside class="shell-sidebar">
      <div class="brand-block">
        <div class="brand-kicker">丽迪莎零售智能平台</div>
        <div class="brand-name">丽迪莎零售分析</div>
        <div class="brand-subtitle">SQLite 数据仓库</div>
      </div>
      <nav class="shell-nav">
        <a class="shell-nav-link{% if active_page == 'home' %} active{% endif %}" href="{{ url_for('index') }}">经营驾驶舱</a>
        <a class="shell-nav-link{% if active_page == 'products' %} active{% endif %}" href="{{ url_for('products.products_page') }}">商品分析</a>
        <a class="shell-nav-link{% if active_page == 'stores' %} active{% endif %}" href="{{ url_for('stores.stores_page') }}">门店分析</a>
        <a class="shell-nav-link{% if active_page == 'regions' %} active{% endif %}" href="{{ url_for('regions.regions_page') }}">区域分析</a>
        <a class="shell-nav-link{% if active_page == 'inventory' %} active{% endif %}" href="{{ url_for('inventory.inventory_page') }}">库存分析</a>
        <a class="shell-nav-link{% if active_page == 'insights' %} active{% endif %}" href="{{ url_for('insights.insights_page') }}">AI 洞察</a>
        <a class="shell-nav-link{% if active_page == 'imports' %} active{% endif %}" href="{{ url_for('imports.imports_page') }}">数据中心</a>
        <a class="shell-nav-link{% if active_page == 'settings' %} active{% endif %}" href="{{ url_for('settings.settings_page') }}">系统设置</a>
      </nav>
      <div class="shell-footer">
        <div>Cloudflare 隧道</div>
        <a href="https://retail.li-disha.com" target="_blank" rel="noreferrer">retail.li-disha.com</a>
      </div>
    </aside>

    <div class="shell-main">
      <header class="shell-topbar">
        <div>
          <div class="topbar-title">{{ page_title or '丽迪莎零售智能平台' }}</div>
          <div class="topbar-subtitle">RPA 导出 → 导入器 → SQLite 数据仓库 → 查询/筛选层 → 仪表板 / 未来 API / AI</div>
        </div>
        <div class="topbar-badge">内部使用</div>
      </header>

      <main class="shell-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>

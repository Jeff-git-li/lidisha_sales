{% extends "base.html" %}
{% from "components/product_card.html" import render_product_card %}

{% block content %}
<section class="page-card">
  <div class="page-header">
    <div>
      <h1>商品分析</h1>
      <p>Top 20 商品直接通过 <code>queries.top20.get_top20_products()</code> 从 SQLite 读取。</p>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-xxl-2 g-3">
    {% for row in rows %}
      {{ render_product_card(row) }}
    {% endfor %}
  </div>
</section>
{% endblock %}
